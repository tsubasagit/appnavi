<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - AppNavi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Firebase設定 -->
    <script src="firebase-config.js"></script>
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <!-- ロゴ・タイトル -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-900 mb-3">AppNavi</h1>
                <p class="text-lg font-semibold text-slate-800 mb-2">誰もがテクノロジーを使いこなし、<br>自らの手でアイデアを形にできる社会を実現する</p>
                <p class="text-sm font-medium text-blue-600 mb-2">無料オープンソースサービス</p>
                <p class="text-sm text-slate-600">表計算ソフトから、5分でWebアプリへ</p>
            </div>

            <!-- サインアップフォーム -->
            <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-lg">
                <h2 class="text-2xl font-semibold text-slate-900 mb-2">新規登録</h2>
                <p class="text-sm text-slate-600 mb-6">Googleアカウントで新規アカウントを作成します</p>

                <!-- エラーメッセージ -->
                <div id="error-message" class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                    <span id="error-text"></span>
                </div>

                <!-- 成功メッセージ -->
                <div id="success-message" class="hidden mb-4 rounded-lg border border-green-200 bg-green-50 p-3 text-sm text-green-700">
                    <span id="success-text"></span>
                </div>

                <!-- Google認証ボタン -->
                <button id="google-signup-btn" class="w-full flex items-center justify-center space-x-3 rounded-lg border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition-colors mb-4">
                    <svg class="h-5 w-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Googleで新規登録</span>
                </button>

                <!-- 説明 -->
                <div class="rounded-lg bg-blue-50 border border-blue-200 p-4 mb-4">
                    <p class="text-xs text-blue-800">
                        <strong>新規登録について</strong><br>
                        Googleアカウントを使用して新規アカウントを作成します。既にGoogleアカウントをお持ちの場合は、そのまま使用できます。
                    </p>
                </div>

                <!-- ログインへのリンク -->
                <div class="text-center pt-4 border-t border-slate-200">
                    <p class="text-sm text-slate-600">
                        既にアカウントをお持ちの方は
                        <a href="login.html" class="font-semibold text-blue-600 hover:text-blue-700">ログイン</a>
                    </p>
                </div>
            </div>

            <!-- フッター -->
            <div class="mt-8 text-center">
                <a href="index.html" class="text-sm text-slate-500 hover:text-slate-700">ダッシュボードに戻る</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Firebase初期化
            await initFirebase();
            
            if (!auth) {
                document.getElementById('error-message').classList.remove('hidden');
                document.getElementById('error-text').textContent = 'Firebase認証が設定されていません。Firebase設定を確認してください。';
                return;
            }

            // 既にログインしている場合はリダイレクト
            if (auth.currentUser) {
                const urlParams = new URLSearchParams(window.location.search);
                const returnUrl = urlParams.get('returnUrl');
                if (returnUrl) {
                    window.location.href = returnUrl;
                } else {
                    window.location.href = 'index.html';
                }
                return;
            }

            // 認証状態の監視
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // 新規登録成功 - ダッシュボードにリダイレクト
                    const urlParams = new URLSearchParams(window.location.search);
                    const returnUrl = urlParams.get('returnUrl');
                    if (returnUrl) {
                        window.location.href = returnUrl;
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            });

            // Googleサインアップボタンのイベント
            document.getElementById('google-signup-btn').addEventListener('click', async () => {
                try {
                    const errorDiv = document.getElementById('error-message');
                    const successDiv = document.getElementById('success-message');
                    const errorText = document.getElementById('error-text');
                    errorDiv.classList.add('hidden');
                    successDiv.classList.add('hidden');

                    // Google認証プロバイダー
                    const provider = new firebase.auth.GoogleAuthProvider();
                    
                    // サインアップボタンを無効化
                    const btn = document.getElementById('google-signup-btn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="animate-spin">⏳</span> 登録中...';

                    // 新規登録実行（Google認証は自動的に新規アカウントを作成）
                    const result = await auth.signInWithPopup(provider);
                    
                    // 新規ユーザーかどうかを確認（初回ログイン時）
                    const isNewUser = result.additionalUserInfo?.isNewUser;
                    
                    if (isNewUser) {
                        successDiv.classList.remove('hidden');
                        document.getElementById('success-text').textContent = 'アカウントが正常に作成されました。ダッシュボードに移動します...';
                    }
                    
                    // 成功時はonAuthStateChangedでリダイレクトされる
                } catch (error) {
                    console.error('Signup error:', error);
                    const errorDiv = document.getElementById('error-message');
                    const errorText = document.getElementById('error-text');
                    
                    let errorMessage = '新規登録に失敗しました。';
                    if (error.code === 'auth/popup-closed-by-user') {
                        errorMessage = '登録ウィンドウが閉じられました。もう一度お試しください。';
                    } else if (error.code === 'auth/popup-blocked') {
                        errorMessage = 'ポップアップがブロックされました。ブラウザの設定でポップアップを許可してください。';
                    } else if (error.code === 'auth/network-request-failed') {
                        errorMessage = 'ネットワークエラーが発生しました。インターネット接続を確認してください。';
                    } else if (error.code === 'auth/account-exists-with-different-credential') {
                        errorMessage = 'このメールアドレスは既に使用されています。ログインページからログインしてください。';
                    } else if (error.message) {
                        errorMessage = error.message;
                    }
                    
                    errorText.textContent = errorMessage;
                    errorDiv.classList.remove('hidden');
                    
                    // ボタンを再有効化
                    const btn = document.getElementById('google-signup-btn');
                    btn.disabled = false;
                    btn.innerHTML = `
                        <svg class="h-5 w-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>Googleで新規登録</span>
                    `;
                }
            });
        });
    </script>
</body>
</html>
